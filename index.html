<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library App</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header>
    <h1>Library App</h1>
    <div class="shelf-selector">
          <label for="bookshelf">Genre</label>
          <select name="bookshelf" id="books-genre-selector">
            <option value="All">-- ALL --</option>
            <option value="Fiction">-- Fiction --</option>
            <option value="Science-fiction">Science fiction</option>
            <option value="Fantasy">Fantasy</option>
            <option value="Romantasy">Romantasy</option>
            <option value="Romance">Romance</option>
            <option value="Child">Children's stories</option>
            <option value="Non-fiction">-- Non-fiction --</option>
            <option value="Autobiographical">Autobiographical</option>
            <option value="Self-improve">Self Improvement</option>
          </select>
        </div>
    <button id="btn-add-book"><img src="./img/plus.svg" alt="Add icon"></button>
  </header>

  <main>
    <div class="book-showroom">
      <div class="bookshelf">
      </div>
    </div>
    <dialog id="add-book">
      <button id="close-dialog">X</button>
      <form id="new-book-form" action="submit">
        <h2>New Book</h2>
        <div>
          <label for="title">Title</label>
          <input type="text" name="title" id="book-title" required>
        </div>
        <div>
          <label for="author">Author</label>
          <input type="text" name="author" id="book-author" required>
        </div>
        <div>
          <label for="pages">Pages</label>
          <input type="number" name="pages" id="book-pages" min="1" max="10100" required>
        </div>
        <div>
          <label for="cover">Cover image</label>
          <input type="url" name="cover" id="book-cover" placeholder="https://...">
        </div>
        <div>
          <label for="genre">Genre</label>
          <select name="genre" id="book-genre">
            <option value="Fiction">-- Fiction --</option>
            <option value="Science-fiction">Science fiction</option>
            <option value="Fantasy">Fantasy</option>
            <option value="Romantasy">Romantasy</option>
            <option value="Romance">Romance</option>
            <option value="Child">Children's stories</option>
            <option value="Non-fiction">-- Non-fiction --</option>
            <option value="Autobiographical">Autobiographical</option>
            <option value="Self-improve">Self Improvement</option>
          </select>
        </div>
        <div>
          <label for="read">Already read?</label>
          <input type="checkbox" name="read" id="book-read" switch>
        </div>
        <div>
          <label for="rating">Rating</label>
          <input type="range" name="rating" id="book-rating" min="1" max="5" step="1" value="1">
        </div>
        <button type="submit">Add Book</button>
      </form>
    </dialog>
  </main>

 
  <script src="./script.js"></script>
</body>
</html>
